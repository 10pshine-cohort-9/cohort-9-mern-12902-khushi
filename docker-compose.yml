
services:
  mongo-db:
    image: mongo:7
    container_name: notes-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes-network

  backend:
    build: ./backend
    container_name: notes-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongo-db:
        condition: service_healthy
    networks:
      - notes-network

  frontend:
    build: ./frontend
    container_name: notes-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - notes-network

volumes:
  mongo-data:
    driver: local

networks:
  notes-network:
    driver: bridge
